<script src="theme.js"></script>
<script>

/* SYMBOL OVERLAY */
const canvas = document.getElementById("symbol-canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const symbols = ["λ","∇","π","Σ","μ","α","β","Δ","∞","⊗"];
const particles = Array.from({length:30},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  vx:(Math.random()-0.5)*1,
  vy:(Math.random()-0.5)*1,
  s:symbols[Math.floor(Math.random()*symbols.length)],
  size:20
}));

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,255,255,0.15)";
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;
    ctx.font=p.size+"px serif";
    ctx.fillText(p.s,p.x,p.y);
  });
  requestAnimationFrame(animate);
}
animate();

/* DOG MOVEMENT */
const dog=document.getElementById("mascot");
const cards=document.querySelectorAll(".flip-card");
let i=0;

function moveDog(){
  const r=cards[i].getBoundingClientRect();
  dog.style.left=r.left+r.width/2+"px";
  dog.style.top=r.bottom-10+"px";
  i=(i+1)%cards.length;
}
window.addEventListener("load",moveDog);
setInterval(moveDog,2000);

</script>
